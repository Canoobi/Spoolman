server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /usr/local/app/config/cert.pem;
    ssl_certificate_key /usr/local/app/config/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;

    # Optional: Root-Aufruf direkt nach /request umleiten
    location = / {
        return 302 /request/;
    }

    # React/Vite App unter /request
    location /request/ {
        alias /usr/share/nginx/html/request/;
        try_files $uri $uri/ /request/index.html;
    }

    # Nur die öffentliche Print-Request-API weiterleiten
    location /api/v1/print-request/public/ {
        proxy_pass http://spoolman:8000/api/v1/print-request/public/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # wichtig für Cookies
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    # Alles andere aus /api blockieren
    location /api/ {
        return 404;
    }
}
